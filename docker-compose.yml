services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: mtotocare
      POSTGRES_PASSWORD: mtotocare
      POSTGRES_DB: mtotocare
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    environment:
      PORT: 4000
      FRONTEND_ORIGIN: http://localhost:3001
      PGHOST: postgres
      PGPORT: 5432
      PGUSER: mtotocare
      PGPASSWORD: mtotocare
      PGDATABASE: mtotocare
      DATABASE_URL: postgres://mtotocare:mtotocare@postgres:5432/mtotocare
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-this-in-production
      JWT_EXPIRES_IN: 8h
    ports:
      - "4000:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - postgres
      - redis

volumes:
  pgdata:
